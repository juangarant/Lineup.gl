<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineup.gl — Simulador Táctico</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="container"></div>

    <!-- Menu principal -->
    <div id="menu-principal">
        <div id="menu-card">
            <h1>LINEUP.GL</h1>
            <p class="menu-sub">Entrenador táctico de granadas de humo</p>
            <div class="menu-player">
                <label for="input-player-name">Nombre jugador</label>
                <input id="input-player-name" type="text" maxlength="18" placeholder="Tu nombre para el ranking" autocomplete="nickname">
            </div>
            <div class="menu-actions">
                <button id="btn-campana">Campaña</button>
                <button id="btn-daily">Daily LineUp</button>
            </div>
            <div id="menu-info">Elige un modo para empezar</div>
            <div id="ranking-daily-menu" style="display:none;"></div>
        </div>
    </div>

    <!-- Overlay "clic para apuntar" -->
    <div id="aim-overlay" style="display:none;">
        <div id="aim-prompt">
            <div class="aim-icon">⊕</div>
            <p>Clic para apuntar</p>
        </div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair" style="display:none;">
        <div class="ch-h"></div>
        <div class="ch-v"></div>
    </div>

    <!-- HUD superior -->
    <div id="ui-top">
        <div id="estado-box">
            <h1 id="titulo-estado">CARGANDO...</h1>
            <p id="instrucciones">Generando escenario táctico</p>
        </div>
    </div>

    <!-- Objetivo actual -->
    <div id="objetivo-panel" style="display:none;">
        <div class="obj-title">OBJETIVO</div>
        <div id="obj-nombre">-</div>
        <div id="obj-regla">-</div>
    </div>

    <!-- Resultado y estrellas -->
    <div id="resultado-panel" style="display:none;">
        <div class="res-title">RESULTADO</div>
        <div id="res-puntaje">0 pts</div>
        <div id="res-estrellas">☆☆☆</div>
        <div id="res-detalle">-</div>
    </div>

    <!-- Stats -->
    <div id="stats-panel">
        <div class="stat-row"><span class="stat-label">RONDA</span><span class="stat-val" id="stat-ronda">—</span></div>
        <div class="stat-row"><span class="stat-label">LANZAM.</span><span class="stat-val" id="stat-lanzam">0</span></div>
        <div class="stat-row"><span class="stat-label">MEJOR</span><span class="stat-val" id="stat-mejor">—</span></div>
        <div class="stat-row"><span class="stat-label">PUNTOS</span><span class="stat-val" id="stat-puntos">0</span></div>
        <div class="stat-row"><span class="stat-label">MAX NIVEL</span><span class="stat-val" id="stat-max-nivel">0</span></div>
    </div>

    <!-- Atajos -->
    <div id="controles-panel">
        <div class="ctrl-hint"><kbd>ESPACIO</kbd> Lanzar</div>
        <div class="ctrl-hint"><kbd>R</kbd> Nuevo mapa</div>
        <div class="ctrl-hint"><kbd>V</kbd> Vista cenital</div>
        <div class="ctrl-hint"><kbd>ESC</kbd> Soltar ratón</div>
    </div>

    <!-- Botones de acción -->
    <div id="btn-container">
        <button id="btn-lanzar"     style="display:none;">⬆ LANZAR</button>
        <button id="btn-nuevo-mapa" style="display:none;">↺ NUEVO MAPA</button>
    </div>

    <script src="lib/three.min_r140.js"></script>
    <script src="lib/OrbitControls.js"></script>
    <script src="lib/GLTFLoader.js"></script>
    <script src="lib/tween_18.js"></script>
    <script src="js/generador.js"></script>
    <script src="js/fisicas.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
